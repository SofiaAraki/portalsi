version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: portalsi_postgres
    restart: always
    environment:
      POSTGRES_USER: portalsi
      POSTGRES_PASSWORD: portalsi_password_segura
      POSTGRES_DB: portalsi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portalsi_network

  api:
    build: ./api
    container_name: portalsi_api
    restart: always
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy 
    networks:
      - portalsi_network

  web:
    build: ./web
    container_name: portalsi_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL}
    depends_on:
      - api
    networks:
      - portalsi_network

volumes:
  postgres_data:

networks:
  portalsi_network:
    driver: bridge